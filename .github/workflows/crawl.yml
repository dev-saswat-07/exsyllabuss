name: FMU Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python crawler.py

      - name: Upload dataset
        uses: actions/upload-artifact@v4
        with:
          name: dataset
          path: dataset.jsonl
